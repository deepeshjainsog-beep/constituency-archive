<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 36" role="img" aria-label="Boundaries">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1c1a16"/>
      <stop offset="100%" stop-color="#2d2a24"/>
    </linearGradient>
  </defs>
  <!-- B mark: a square with two horizontal cuts suggesting constituency boundaries -->
  <rect x="0" y="2" width="32" height="32" rx="5" fill="#1c1a16"/>
  <!-- horizontal boundary lines inside the B mark -->
  <line x1="8" y1="14" x2="24" y2="14" stroke="#faf8f5" stroke-width="1.2" opacity="0.5"/>
  <line x1="8" y1="22" x2="24" y2="22" stroke="#faf8f5" stroke-width="1.2" opacity="0.5"/>
  <!-- B letterform -->
  <text x="16" y="25" text-anchor="middle" font-family="Georgia, serif" font-size="19" font-weight="400" fill="#faf8f5">B</text>
  <!-- Wordmark -->
  <text x="42" y="24" font-family="'DM Serif Display', Georgia, serif" font-size="18" font-weight="400" fill="#1c1a16" letter-spacing="-0.3">Boundaries</text>
</svg>
